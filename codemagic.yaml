workflows:
  ios-testflight:
    name: NCC Onboarding — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Admin Key

    environment:
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"
        BUNDLE_ID: "org.barrowneuro.nccapp"

    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Set up keychain
        script: keychain initialize

      - name: Generate certificate private key
        script: |
          openssl genrsa -out /tmp/ios_dist_key.pem 2048

      - name: Create Distribution Certificate
        script: |
          app-store-connect certificates create \
            --type IOS_DISTRIBUTION \
            --certificate-key /tmp/ios_dist_key.pem \
            --save

      - name: Fetch or create provisioning profile
        script: |
          app-store-connect fetch-signing-files "$BUNDLE_ID" \
            --type IOS_APP_STORE \
            --certificate-key /tmp/ios_dist_key.pem \
            --create

      - name: Add certificates to keychain
        script: keychain add-certificates

      - name: Set up code signing in Xcode
        script: xcode-project use-profiles

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - NCC Team
