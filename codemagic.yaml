workflows:
  ios-testflight:
    name: NCC Onboarding — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      ios_signing:
        distribution_type: app_store        # for TestFlight + App Store
        bundle_identifier: org.barrowneuro.nccapp
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Set Xcode version
        script: |
          xcode-select --print-path

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install --repo-update

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration          # uses your Apple Developer credentials from Codemagic dashboard
        submit_to_testflight: true
        beta_groups:
          - NCC Team
