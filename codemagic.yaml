workflows:
  ios-testflight:
    name: NCC Onboarding — iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Codemagic Admin Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: org.barrowneuro.nccapp
      vars:
        XCODE_PROJECT: "ios/App/App.xcodeproj"
        XCODE_SCHEME: "App"

    scripts:
      - name: Install Node dependencies
        script: |
          npm install --legacy-peer-deps

      - name: Sync Capacitor
        script: |
          npx cap sync ios

      - name: Set up code signing settings on Xcode project
        script: xcode-project use-profiles

      - name: Build iOS
        script: |
          xcode-project build-ipa \
            --project "$XCODE_PROJECT" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        beta_groups:
          - NCC Team
