<svg width="700" height="460" viewBox="0 0 700 460" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="460" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Tiered ICP Management Protocol</text>
  <text x="350" y="50" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Escalate stepwise — confirm ICP &gt;20 mmHg sustained &gt;5 min before advancing tier</text>

  <!-- TIER 0 — foundation (widest) -->
  <rect x="30" y="65" width="640" height="72" rx="8" fill="#e0f2fe" stroke="#0284c7" stroke-width="2"/>
  <text x="70" y="90" font-size="13" font-weight="700" fill="#0369a1">TIER 0 — Universal Measures (all patients, all the time)</text>
  <text x="70" y="108" font-size="11" fill="#0c4a6e">&#x2022; HOB 30&#xB0;, head midline, no neck compression</text>
  <text x="70" y="123" font-size="11" fill="#0c4a6e">&#x2022; Euvolemia &#x2022; Normothermia (T &lt;37.5&#xB0;C) &#x2022; Normoglycemia (80-180 mg/dL) &#x2022; Optimize analgesia/sedation &#x2022; Seizure prophylaxis</text>

  <!-- Arrow down -->
  <text x="350" y="155" text-anchor="middle" font-size="18" fill="#64748b">&#x2193;</text>
  <text x="350" y="170" text-anchor="middle" font-size="10" fill="#94a3b8">ICP &gt;20 sustained</text>

  <!-- TIER 1 -->
  <rect x="60" y="175" width="580" height="72" rx="8" fill="#fef9c3" stroke="#ca8a04" stroke-width="2"/>
  <text x="100" y="200" font-size="13" font-weight="700" fill="#713f12">TIER 1 — First-Line Medical</text>
  <text x="100" y="218" font-size="11" fill="#713f12">&#x2022; Osmotherapy: Mannitol 0.25-1 g/kg IV OR 23.4% NaCl 30 mL via central line</text>
  <text x="100" y="233" font-size="11" fill="#713f12">&#x2022; CSF drainage (if EVD in place) — drain 3-5 mL bolus &#x2022; Optimize sedation (propofol, fentanyl)</text>

  <!-- Arrow down -->
  <text x="350" y="258" text-anchor="middle" font-size="18" fill="#64748b">&#x2193;</text>
  <text x="350" y="273" text-anchor="middle" font-size="10" fill="#94a3b8">ICP refractory to Tier 1</text>

  <!-- TIER 2 -->
  <rect x="100" y="278" width="500" height="72" rx="8" fill="#ffedd5" stroke="#ea580c" stroke-width="2"/>
  <text x="140" y="303" font-size="13" font-weight="700" fill="#9a3412">TIER 2 — Escalated Medical</text>
  <text x="140" y="321" font-size="11" fill="#7c2d12">&#x2022; Neuromuscular blockade (cisatracurium) &#x2022; Moderate hyperventilation: target PaCO&#x2082; 30-35 mmHg (bridge only)</text>
  <text x="140" y="336" font-size="11" fill="#7c2d12">&#x2022; Barbiturate coma (pentobarbital) if no surgical option &#x2022; Hypothermia 35-36&#xB0;C (selected centers)</text>

  <!-- Arrow down -->
  <text x="350" y="361" text-anchor="middle" font-size="18" fill="#64748b">&#x2193;</text>
  <text x="350" y="376" text-anchor="middle" font-size="10" fill="#94a3b8">Refractory, surgically accessible</text>

  <!-- TIER 3 — apex (narrowest) -->
  <rect x="150" y="381" width="400" height="60" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2.5"/>
  <text x="350" y="406" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">TIER 3 — Surgical / Last Resort</text>
  <text x="350" y="424" text-anchor="middle" font-size="11" fill="#7f1d1d">&#x2022; Decompressive craniectomy &#x2022; Surgical evacuation of hematoma/mass &#x2022; Hypothermia (protocol-driven)</text>

  <!-- Key reminders at bottom -->
  <rect x="30" y="452" width="640" height="0" rx="6" fill="#1e3a5f"/>

  <!-- Side escalation urgency label -->
  <text x="16" y="200" font-size="11" fill="#64748b" transform="rotate(-90 16 260)">&#x2191; Escalating Urgency</text>
  <line x1="22" y1="175" x2="22" y2="450" stroke="#94a3b8" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#uparrow)"/>

  <defs>
    <marker id="uparrow" markerWidth="8" markerHeight="8" refX="4" refY="4" orient="auto">
      <path d="M4,0 L8,8 L0,8 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
