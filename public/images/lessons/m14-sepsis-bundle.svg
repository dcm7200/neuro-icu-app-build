<svg viewBox="0 0 800 480" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <rect width="800" height="480" fill="#f8fafc" rx="12"/>
  <rect width="800" height="56" fill="#1e3a5f" rx="12"/>
  <rect y="44" width="800" height="12" fill="#1e3a5f"/>
  <text x="400" y="35" text-anchor="middle" fill="white" font-size="19" font-weight="bold">Sepsis Hour-1 Bundle (SSC 2018)</text>

  <!-- 5 elements -->
  <!-- 1 -->
  <rect x="20" y="72" width="148" height="200" fill="white" rx="8" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="94" cy="100" r="22" fill="#1d4ed8"/>
  <text x="94" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">1</text>
  <text x="94" y="136" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Measure</text>
  <text x="94" y="150" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Lactate</text>
  <text x="94" y="174" text-anchor="middle" fill="#374151" font-size="10">Remeasure if</text>
  <text x="94" y="188" text-anchor="middle" fill="#374151" font-size="10">initial &gt;2 mmol/L</text>
  <text x="94" y="204" text-anchor="middle" fill="#374151" font-size="10">Target: normalize</text>
  <text x="94" y="218" text-anchor="middle" fill="#374151" font-size="10">lactate level</text>
  <text x="94" y="255" text-anchor="middle" fill="#6b7280" font-size="10">Tissue hypoxia</text>
  <text x="94" y="267" text-anchor="middle" fill="#6b7280" font-size="10">marker</text>

  <!-- 2 -->
  <rect x="178" y="72" width="148" height="200" fill="white" rx="8" stroke="#93c5fd" stroke-width="2"/>
  <circle cx="252" cy="100" r="22" fill="#1d4ed8"/>
  <text x="252" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">2</text>
  <text x="252" y="136" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Blood</text>
  <text x="252" y="150" text-anchor="middle" fill="#1e40af" font-size="11" font-weight="bold">Cultures</text>
  <text x="252" y="174" text-anchor="middle" fill="#374151" font-size="10">Before antibiotics</text>
  <text x="252" y="188" text-anchor="middle" fill="#374151" font-size="10">≥2 sets</text>
  <text x="252" y="204" text-anchor="middle" fill="#374151" font-size="10">Aerobic + anaerobic</text>
  <text x="252" y="255" text-anchor="middle" fill="#6b7280" font-size="10">Don't delay abx</text>
  <text x="252" y="267" text-anchor="middle" fill="#6b7280" font-size="10">for cultures</text>

  <!-- 3 -->
  <rect x="336" y="72" width="148" height="200" fill="white" rx="8" stroke="#86efac" stroke-width="2"/>
  <circle cx="410" cy="100" r="22" fill="#15803d"/>
  <text x="410" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">3</text>
  <text x="410" y="136" text-anchor="middle" fill="#14532d" font-size="11" font-weight="bold">Broad-Spectrum</text>
  <text x="410" y="150" text-anchor="middle" fill="#14532d" font-size="11" font-weight="bold">Antibiotics</text>
  <text x="410" y="174" text-anchor="middle" fill="#374151" font-size="10">Within 1 hour</text>
  <text x="410" y="188" text-anchor="middle" fill="#374151" font-size="10">of recognition</text>
  <text x="410" y="204" text-anchor="middle" fill="#374151" font-size="10">De-escalate when</text>
  <text x="410" y="218" text-anchor="middle" fill="#374151" font-size="10">cultures return</text>
  <text x="410" y="255" text-anchor="middle" fill="#dc2626" font-size="10">Every hour delay</text>
  <text x="410" y="267" text-anchor="middle" fill="#dc2626" font-size="10">↑ mortality ~7%</text>

  <!-- 4 -->
  <rect x="494" y="72" width="148" height="200" fill="white" rx="8" stroke="#fcd34d" stroke-width="2"/>
  <circle cx="568" cy="100" r="22" fill="#b45309"/>
  <text x="568" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">4</text>
  <text x="568" y="136" text-anchor="middle" fill="#78350f" font-size="11" font-weight="bold">30 mL/kg</text>
  <text x="568" y="150" text-anchor="middle" fill="#78350f" font-size="11" font-weight="bold">Crystalloid</text>
  <text x="568" y="174" text-anchor="middle" fill="#374151" font-size="10">If hypotension or</text>
  <text x="568" y="188" text-anchor="middle" fill="#374151" font-size="10">lactate ≥4 mmol/L</text>
  <text x="568" y="204" text-anchor="middle" fill="#374151" font-size="10">Reassess after</text>
  <text x="568" y="218" text-anchor="middle" fill="#374151" font-size="10">each bolus</text>
  <text x="568" y="255" text-anchor="middle" fill="#6b7280" font-size="10">Normal saline or</text>
  <text x="568" y="267" text-anchor="middle" fill="#6b7280" font-size="10">lactated Ringer's</text>

  <!-- 5 -->
  <rect x="652" y="72" width="128" height="200" fill="white" rx="8" stroke="#fca5a5" stroke-width="2"/>
  <circle cx="716" cy="100" r="22" fill="#dc2626"/>
  <text x="716" y="107" text-anchor="middle" fill="white" font-size="20" font-weight="bold">5</text>
  <text x="716" y="136" text-anchor="middle" fill="#7f1d1d" font-size="11" font-weight="bold">Vasopressors</text>
  <text x="716" y="150" text-anchor="middle" fill="#7f1d1d" font-size="11" font-weight="bold">if MAP &lt;65</text>
  <text x="716" y="174" text-anchor="middle" fill="#374151" font-size="10">Norepinephrine</text>
  <text x="716" y="188" text-anchor="middle" fill="#374151" font-size="10">first-line</text>
  <text x="716" y="204" text-anchor="middle" fill="#374151" font-size="10">Vasopressin or</text>
  <text x="716" y="218" text-anchor="middle" fill="#374151" font-size="10">epinephrine 2nd</text>
  <text x="716" y="255" text-anchor="middle" fill="#6b7280" font-size="10">Prefer central</text>
  <text x="716" y="267" text-anchor="middle" fill="#6b7280" font-size="10">line when able</text>

  <!-- Source control arrow -->
  <rect x="20" y="290" width="760" height="60" fill="#f1f5f9" rx="8" stroke="#cbd5e1" stroke-width="1"/>
  <text x="400" y="313" text-anchor="middle" fill="#1e3a5f" font-size="13" font-weight="bold">+ Source Control</text>
  <text x="400" y="336" text-anchor="middle" fill="#374151" font-size="11">Identify and control infectious source ASAP — drainage, debridement, or removal of infected device</text>

  <!-- Vasopressor hierarchy -->
  <rect x="20" y="364" width="760" height="104" fill="white" rx="8" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="400" y="385" text-anchor="middle" fill="#7f1d1d" font-size="13" font-weight="bold">Vasopressor Hierarchy in Septic Shock</text>
  <rect x="30" y="394" width="180" height="60" fill="#fef2f2" rx="6"/>
  <text x="120" y="412" text-anchor="middle" fill="#dc2626" font-size="11" font-weight="bold">1st Line</text>
  <text x="120" y="430" text-anchor="middle" fill="#374151" font-size="11">Norepinephrine</text>
  <text x="120" y="447" text-anchor="middle" fill="#374151" font-size="10">(α &gt; β; ↑ MAP, ↑ SVR)</text>
  <rect x="220" y="394" width="180" height="60" fill="#fff7ed" rx="6"/>
  <text x="310" y="412" text-anchor="middle" fill="#b45309" font-size="11" font-weight="bold">2nd Line</text>
  <text x="310" y="430" text-anchor="middle" fill="#374151" font-size="11">Vasopressin 0.03 u/min</text>
  <text x="310" y="447" text-anchor="middle" fill="#374151" font-size="10">(NE-sparing; V1 receptor)</text>
  <rect x="410" y="394" width="180" height="60" fill="#fdf4ff" rx="6"/>
  <text x="500" y="412" text-anchor="middle" fill="#7e22ce" font-size="11" font-weight="bold">Refractory</text>
  <text x="500" y="430" text-anchor="middle" fill="#374151" font-size="11">Epinephrine or</text>
  <text x="500" y="447" text-anchor="middle" fill="#374151" font-size="10">Angiotensin II</text>
  <rect x="600" y="394" width="170" height="60" fill="#f0fdf4" rx="6"/>
  <text x="685" y="412" text-anchor="middle" fill="#15803d" font-size="11" font-weight="bold">Low CO state</text>
  <text x="685" y="430" text-anchor="middle" fill="#374151" font-size="11">Add Dobutamine</text>
  <text x="685" y="447" text-anchor="middle" fill="#374151" font-size="10">(inotrope + vasodilator)</text>
</svg>
