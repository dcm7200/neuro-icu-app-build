<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">aSAH: Vasospasm Timeline and DCI Management</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">DCI (delayed cerebral ischemia) occurs in 30% of aSAH. Peak Days 7-10. Vigilance until Day 21.</text>

  <!-- Timeline axis -->
  <line x1="50" y1="110" x2="670" y2="110" stroke="#334155" stroke-width="2.5"/>

  <!-- Day markers: Day 0 to Day 21 -->
  <!-- Scale: x = 50 + day * (620/21) = 50 + day * 29.5 -->
  <!-- Day 0=50, 1=79, 2=109, 3=138, 4=168, 5=197, 6=227, 7=256, 8=286, 9=315, 10=345, 14=463, 21=670 -->
  <line x1="50" y1="106" x2="50" y2="114" stroke="#334155" stroke-width="2"/><text x="50" y="128" text-anchor="middle" font-size="10" fill="#334155">0</text>
  <line x1="109" y1="106" x2="109" y2="114" stroke="#64748b" stroke-width="1.5"/><text x="109" y="128" text-anchor="middle" font-size="10" fill="#64748b">2</text>
  <line x1="197" y1="106" x2="197" y2="114" stroke="#64748b" stroke-width="1.5"/><text x="197" y="128" text-anchor="middle" font-size="10" fill="#64748b">5</text>
  <line x1="256" y1="106" x2="256" y2="114" stroke="#dc2626" stroke-width="2"/><text x="256" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">7</text>
  <line x1="345" y1="106" x2="345" y2="114" stroke="#dc2626" stroke-width="2"/><text x="345" y="128" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">10</text>
  <line x1="463" y1="106" x2="463" y2="114" stroke="#d97706" stroke-width="1.5"/><text x="463" y="128" text-anchor="middle" font-size="10" fill="#d97706">14</text>
  <line x1="670" y1="106" x2="670" y2="114" stroke="#334155" stroke-width="2"/><text x="670" y="128" text-anchor="middle" font-size="10" fill="#334155">21</text>
  <text x="360" y="145" text-anchor="middle" font-size="11" fill="#334155">Days post-SAH</text>

  <!-- Rebleeding risk (first 72h) bar above timeline -->
  <rect x="50" y="72" width="89" height="30" rx="4" fill="#7f1d1d" opacity="0.85"/>
  <text x="94" y="91" text-anchor="middle" font-size="10" font-weight="700" fill="white">Rebleed risk (72h)</text>

  <!-- Vasospasm risk zone (day 3-21, peak 7-10) -->
  <rect x="138" y="155" width="532" height="30" rx="4" fill="#fde68a" opacity="0.5"/>
  <text x="404" y="175" text-anchor="middle" font-size="10" fill="#92400e">Vasospasm risk window (Day 3–21)</text>
  <!-- Peak zone -->
  <rect x="256" y="155" width="89" height="30" rx="4" fill="#ef4444" opacity="0.7"/>
  <text x="300" y="175" text-anchor="middle" font-size="10" font-weight="700" fill="white">PEAK (7–10)</text>

  <!-- Daily monitoring row -->
  <text x="30" y="210" text-anchor="end" font-size="10" fill="#334155" font-weight="600">Monitor:</text>
  <rect x="50" y="195" width="620" height="24" rx="4" fill="#e0f2fe"/>
  <text x="115" y="211" text-anchor="middle" font-size="9" fill="#0369a1">TCD daily D3-14</text>
  <text x="265" y="211" text-anchor="middle" font-size="9" fill="#0369a1">Neuro checks q2-4h</text>
  <text x="420" y="211" text-anchor="middle" font-size="9" fill="#0369a1">CTA/CTP if exam change</text>
  <text x="580" y="211" text-anchor="middle" font-size="9" fill="#0369a1">Continue until Day 14+</text>

  <!-- Treatment ladder -->
  <rect x="20" y="235" width="660" height="120" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="350" y="253" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">DCI/Vasospasm Treatment Ladder</text>

  <!-- Step 1 -->
  <rect x="30" y="260" width="190" height="84" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="125" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#1d4ed8">Step 1 — Always</text>
  <text x="125" y="295" text-anchor="middle" font-size="10" fill="#1e3a5f">Nimodipine 60mg q4h PO</text>
  <text x="125" y="310" text-anchor="middle" font-size="10" fill="#1e3a5f">×21 days (reduces DCI)</text>
  <text x="125" y="325" text-anchor="middle" font-size="10" fill="#1e3a5f">Euvolemia + normonatremia</text>
  <text x="125" y="340" text-anchor="middle" font-size="9" fill="#64748b">NOT hypervolemia (outdated)</text>

  <!-- Step 2 -->
  <rect x="235" y="260" width="190" height="84" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="330" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Step 2 — DCI suspected</text>
  <text x="330" y="295" text-anchor="middle" font-size="10" fill="#1e3a5f">Induced hypertension</text>
  <text x="330" y="310" text-anchor="middle" font-size="10" fill="#1e3a5f">SBP target 160-220 mmHg</text>
  <text x="330" y="325" text-anchor="middle" font-size="10" fill="#1e3a5f">Norepinephrine or phenylephrine</text>
  <text x="330" y="340" text-anchor="middle" font-size="9" fill="#64748b">After aneurysm is secured</text>

  <!-- Step 3 -->
  <rect x="440" y="260" width="230" height="84" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="555" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Step 3 — Refractory DCI</text>
  <text x="555" y="295" text-anchor="middle" font-size="10" fill="#1e3a5f">Endovascular intervention:</text>
  <text x="555" y="310" text-anchor="middle" font-size="10" fill="#1e3a5f">Intra-arterial verapamil or</text>
  <text x="555" y="325" text-anchor="middle" font-size="10" fill="#1e3a5f">nicardipine + balloon</text>
  <text x="555" y="340" text-anchor="middle" font-size="10" fill="#1e3a5f">angioplasty for refractory spasm</text>
</svg>
