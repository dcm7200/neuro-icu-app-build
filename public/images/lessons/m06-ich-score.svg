<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Spontaneous ICH Score and Surgical Decision</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">ICH Score predicts 30-day mortality. Surgical candidacy depends on location, volume, and trajectory.</text>

  <!-- ICH Score Table (left) -->
  <rect x="20" y="58" width="310" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="58" width="310" height="30" rx="8" fill="#1e3a5f"/>
  <rect x="20" y="76" width="310" height="12" fill="#1e3a5f"/>
  <text x="175" y="79" text-anchor="middle" font-size="13" font-weight="700" fill="white">ICH Score</text>

  <!-- Column headers -->
  <rect x="28" y="95" width="290" height="18" rx="2" fill="#f1f5f9"/>
  <text x="120" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Component</text>
  <text x="255" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Criteria</text>
  <text x="310" y="108" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Pts</text>
  <line x1="28" y1="113" x2="322" y2="113" stroke="#e2e8f0" stroke-width="1"/>

  <!-- GCS row -->
  <text x="45" y="132" font-size="11" font-weight="600" fill="#334155">GCS</text>
  <text x="175" y="127" font-size="10" fill="#334155">3–4</text>
  <text x="310" y="127" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">2</text>
  <text x="175" y="141" font-size="10" fill="#334155">5–12</text>
  <text x="310" y="141" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">1</text>
  <text x="175" y="155" font-size="10" fill="#334155">13–15</text>
  <text x="310" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">0</text>
  <line x1="28" y1="161" x2="322" y2="161" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Age row -->
  <text x="45" y="177" font-size="11" font-weight="600" fill="#334155">Age</text>
  <text x="175" y="172" font-size="10" fill="#334155">≥80</text>
  <text x="310" y="172" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">1</text>
  <text x="175" y="186" font-size="10" fill="#334155">&lt;80</text>
  <text x="310" y="186" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">0</text>
  <line x1="28" y1="192" x2="322" y2="192" stroke="#f1f5f9" stroke-width="1"/>

  <!-- ICH Volume -->
  <text x="45" y="208" font-size="11" font-weight="600" fill="#334155">Volume</text>
  <text x="175" y="203" font-size="10" fill="#334155">≥30 mL</text>
  <text x="310" y="203" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">1</text>
  <text x="175" y="217" font-size="10" fill="#334155">&lt;30 mL</text>
  <text x="310" y="217" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">0</text>
  <line x1="28" y1="223" x2="322" y2="223" stroke="#f1f5f9" stroke-width="1"/>

  <!-- IVH -->
  <text x="45" y="239" font-size="11" font-weight="600" fill="#334155">IVH</text>
  <text x="175" y="234" font-size="10" fill="#334155">Present</text>
  <text x="310" y="234" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">1</text>
  <text x="175" y="248" font-size="10" fill="#334155">Absent</text>
  <text x="310" y="248" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">0</text>
  <line x1="28" y1="254" x2="322" y2="254" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Location -->
  <text x="45" y="270" font-size="11" font-weight="600" fill="#334155">Location</text>
  <text x="175" y="265" font-size="10" fill="#334155">Infratentorial</text>
  <text x="310" y="265" text-anchor="middle" font-size="11" font-weight="700" fill="#d97706">1</text>
  <text x="175" y="279" font-size="10" fill="#334155">Supratentorial</text>
  <text x="310" y="279" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">0</text>
  <line x1="28" y1="285" x2="322" y2="285" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Outcomes -->
  <text x="175" y="305" text-anchor="middle" font-size="11" font-weight="700" fill="#334155">Score → 30-day Mortality</text>
  <rect x="28" y="310" width="62" height="36" rx="3" fill="#dcfce7"/>
  <text x="59" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">0</text>
  <text x="59" y="340" text-anchor="middle" font-size="10" fill="#15803d">0%</text>
  <rect x="97" y="310" width="62" height="36" rx="3" fill="#fef9c3"/>
  <text x="128" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#92400e">1</text>
  <text x="128" y="340" text-anchor="middle" font-size="10" fill="#92400e">13%</text>
  <rect x="166" y="310" width="62" height="36" rx="3" fill="#ffedd5"/>
  <text x="197" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#9a3412">2</text>
  <text x="197" y="340" text-anchor="middle" font-size="10" fill="#9a3412">26%</text>
  <rect x="235" y="310" width="62" height="36" rx="3" fill="#fee2e2"/>
  <text x="266" y="325" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">3</text>
  <text x="266" y="340" text-anchor="middle" font-size="10" fill="#dc2626">72%</text>
  <rect x="28" y="310" width="0" height="0"/><!-- spacer -->
  <!-- Score 4-6 combined -->
  <rect x="28" y="350" width="290" height="20" rx="3" fill="#7f1d1d"/>
  <text x="175" y="364" text-anchor="middle" font-size="10" fill="white" font-weight="700">Score 4–6: 97–100% mortality</text>

  <!-- Surgical Decision Flowchart (right) -->
  <rect x="345" y="58" width="335" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="345" y="58" width="335" height="30" rx="8" fill="#7c3aed"/>
  <rect x="345" y="76" width="335" height="12" fill="#7c3aed"/>
  <text x="512" y="79" text-anchor="middle" font-size="13" font-weight="700" fill="white">Surgical Candidacy</text>

  <text x="512" y="110" text-anchor="middle" font-size="11" font-weight="600" fill="#334155">Key Question: Is this surgically accessible?</text>

  <!-- Box: Lobar/Cerebellar — yes -->
  <rect x="355" y="118" width="148" height="70" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="429" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">CONSIDER SURGERY</text>
  <text x="429" y="152" text-anchor="middle" font-size="10" fill="#166534">&#x2022; Cerebellar &gt;3cm or obstructed</text>
  <text x="429" y="166" text-anchor="middle" font-size="10" fill="#166534">&#x2022; Lobar, GCS 9-12, age &lt;70</text>
  <text x="429" y="180" text-anchor="middle" font-size="10" fill="#166534">&#x2022; Trajectory: deteriorating</text>

  <!-- Box: Basal ganglia/thalamic — rarely -->
  <rect x="520" y="118" width="148" height="70" rx="6" fill="#fef3c7" stroke="#d97706" stroke-width="1.5"/>
  <text x="594" y="136" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">RARELY SURGICAL</text>
  <text x="594" y="152" text-anchor="middle" font-size="10" fill="#713f12">&#x2022; Basal ganglia / thalamus</text>
  <text x="594" y="166" text-anchor="middle" font-size="10" fill="#713f12">&#x2022; Deep eloquent cortex</text>
  <text x="594" y="180" text-anchor="middle" font-size="10" fill="#713f12">&#x2022; High surgical risk/morbidity</text>

  <!-- ICH bundle -->
  <text x="512" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">ICH Bundle (ALL patients)</text>
  <rect x="355" y="214" width="315" height="100" rx="6" fill="#f8fafc" stroke="#e2e8f0" stroke-width="1"/>
  <text x="365" y="232" font-size="10" fill="#334155">&#x2022; BP target SBP &lt;140 within 1h (IV nicardipine/labetalol)</text>
  <text x="365" y="248" font-size="10" fill="#334155">&#x2022; Anticoagulation reversal if applicable — STAT</text>
  <text x="365" y="264" font-size="10" fill="#334155">&#x2022; Seizure prophylaxis if cortical involvement</text>
  <text x="365" y="280" font-size="10" fill="#334155">&#x2022; ICP monitoring if GCS ≤8 or hydrocephalus</text>
  <text x="365" y="296" font-size="10" fill="#334155">&#x2022; Glucose &amp; temperature normalization</text>
  <text x="365" y="312" font-size="10" fill="#dc2626" font-weight="600">&#x2022; Spot sign on CTA = high expansion risk — aggressive tx</text>

  <!-- Bottom bar -->
  <rect x="20" y="366" width="660" height="22" rx="6" fill="#1e3a5f"/>
  <text x="350" y="381" text-anchor="middle" font-size="11" fill="white" font-weight="600">Volume formula (ABC/2): A × B × C slices ÷ 2 — document on CT read and reassess at 24h for expansion</text>
</svg>
