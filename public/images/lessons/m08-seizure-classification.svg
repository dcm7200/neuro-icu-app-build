<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">ILAE Seizure Classification (2017)</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Onset type determines treatment. In the NCC, always consider NCSE in any unexplained AMS.</text>

  <!-- Root: Seizure onset -->
  <rect x="270" y="60" width="160" height="34" rx="6" fill="#1e3a5f"/>
  <text x="350" y="82" text-anchor="middle" font-size="12" font-weight="700" fill="white">Seizure Onset</text>

  <!-- Three branches down -->
  <line x1="350" y1="94" x2="350" y2="115" stroke="#94a3b8" stroke-width="2"/>
  <line x1="350" y1="115" x2="130" y2="115" stroke="#94a3b8" stroke-width="2"/>
  <line x1="350" y1="115" x2="570" y2="115" stroke="#94a3b8" stroke-width="2"/>
  <line x1="130" y1="115" x2="130" y2="132" stroke="#94a3b8" stroke-width="2" marker-end="url(#ca)"/>
  <line x1="350" y1="115" x2="350" y2="132" stroke="#94a3b8" stroke-width="2" marker-end="url(#ca)"/>
  <line x1="570" y1="115" x2="570" y2="132" stroke="#94a3b8" stroke-width="2" marker-end="url(#ca)"/>

  <!-- FOCAL -->
  <rect x="38" y="132" width="184" height="30" rx="6" fill="#3b82f6"/>
  <text x="130" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="white">FOCAL (Partial)</text>

  <!-- GENERALIZED -->
  <rect x="258" y="132" width="184" height="30" rx="6" fill="#7c3aed"/>
  <text x="350" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="white">GENERALIZED</text>

  <!-- UNKNOWN -->
  <rect x="478" y="132" width="184" height="30" rx="6" fill="#64748b"/>
  <text x="570" y="152" text-anchor="middle" font-size="12" font-weight="700" fill="white">UNKNOWN Onset</text>

  <!-- FOCAL subtypes -->
  <line x1="130" y1="162" x2="130" y2="178" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="130" y1="178" x2="65" y2="178" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="130" y1="178" x2="195" y2="178" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="65" y1="178" x2="65" y2="192" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ca)"/>
  <line x1="195" y1="178" x2="195" y2="192" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ca)"/>

  <rect x="25" y="192" width="80" height="24" rx="4" fill="#bfdbfe"/>
  <text x="65" y="208" text-anchor="middle" font-size="10" fill="#1e40af">Aware</text>
  <rect x="155" y="192" width="80" height="24" rx="4" fill="#93c5fd"/>
  <text x="195" y="208" text-anchor="middle" font-size="10" fill="#1e3a5f">Impaired</text>
  <text x="195" y="220" text-anchor="middle" font-size="9" fill="#64748b">Awareness</text>

  <!-- Focal motor/non-motor -->
  <rect x="25" y="228" width="210" height="50" rx="4" fill="#eff6ff" stroke="#93c5fd" stroke-width="1"/>
  <text x="130" y="244" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">Focal subtypes:</text>
  <text x="130" y="258" text-anchor="middle" font-size="9" fill="#334155">Motor: clonic, tonic, atonic, myoclonic</text>
  <text x="130" y="272" text-anchor="middle" font-size="9" fill="#334155">Non-motor: automatisms, sensory, autonomic</text>

  <!-- Focal to bilateral -->
  <line x1="130" y1="278" x2="130" y2="292" stroke="#3b82f6" stroke-width="1.5" marker-end="url(#ca)"/>
  <rect x="42" y="292" width="176" height="24" rx="4" fill="#1d4ed8"/>
  <text x="130" y="308" text-anchor="middle" font-size="10" font-weight="700" fill="white">Focal → Bilateral Tonic-Clonic</text>

  <!-- GENERALIZED subtypes -->
  <rect x="215" y="172" width="270" height="148" rx="6" fill="#f5f3ff" stroke="#a78bfa" stroke-width="1.5"/>
  <text x="350" y="192" text-anchor="middle" font-size="10" font-weight="700" fill="#6d28d9">Generalized subtypes:</text>

  <rect x="225" y="200" width="115" height="22" rx="3" fill="#a78bfa"/>
  <text x="282" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="white">Motor</text>
  <rect x="355" y="200" width="120" height="22" rx="3" fill="#c4b5fd"/>
  <text x="415" y="215" text-anchor="middle" font-size="10" font-weight="700" fill="#4c1d95">Non-Motor</text>

  <text x="282" y="235" text-anchor="middle" font-size="9" fill="#334155">Tonic-clonic (GTCS)</text>
  <text x="282" y="249" text-anchor="middle" font-size="9" fill="#334155">Tonic</text>
  <text x="282" y="263" text-anchor="middle" font-size="9" fill="#334155">Atonic ("drop attack")</text>
  <text x="282" y="277" text-anchor="middle" font-size="9" fill="#334155">Myoclonic</text>
  <text x="282" y="291" text-anchor="middle" font-size="9" fill="#334155">Clonic</text>
  <text x="415" y="235" text-anchor="middle" font-size="9" fill="#334155">Absence (typical)</text>
  <text x="415" y="249" text-anchor="middle" font-size="9" fill="#334155">Absence (atypical)</text>
  <text x="415" y="263" text-anchor="middle" font-size="9" fill="#334155">Myoclonic absence</text>
  <text x="415" y="277" text-anchor="middle" font-size="9" fill="#334155">Eyelid myoclonia</text>
  <text x="415" y="291" text-anchor="middle" font-size="9" fill="#64748b">NCSE — subtle/absent clonic</text>
  <text x="415" y="305" text-anchor="middle" font-size="9" fill="#dc2626" font-weight="600">↑ in ICU — cEEG required</text>

  <!-- Unknown subtypes -->
  <rect x="488" y="172" width="174" height="148" rx="6" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="575" y="190" text-anchor="middle" font-size="10" font-weight="700" fill="#334155">Unclassified:</text>
  <text x="575" y="208" text-anchor="middle" font-size="9" fill="#475569">Onset not witnessed</text>
  <text x="575" y="222" text-anchor="middle" font-size="9" fill="#475569">Unclear focal vs generalized</text>
  <text x="575" y="238" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">In ICU: order cEEG</text>
  <text x="575" y="255" text-anchor="middle" font-size="9" fill="#64748b">25% of comatose patients</text>
  <text x="575" y="268" text-anchor="middle" font-size="9" fill="#64748b">have NCSE — most missed</text>
  <text x="575" y="284" text-anchor="middle" font-size="9" fill="#64748b">without EEG monitoring</text>
  <rect x="500" y="296" width="148" height="16" rx="3" fill="#dc2626"/>
  <text x="574" y="308" text-anchor="middle" font-size="9" fill="white" font-weight="700">AMS + known brain injury = EEG</text>

  <!-- Bottom bar -->
  <rect x="20" y="356" width="660" height="36" rx="6" fill="#1e3a5f"/>
  <text x="350" y="371" text-anchor="middle" font-size="11" font-weight="700" fill="#fbbf24">NCC Key Points</text>
  <text x="350" y="386" text-anchor="middle" font-size="10" fill="white">NCSE presents as AMS, not convulsions — cEEG is the only way to diagnose it. Order early, not after days of "encephalopathy."</text>
</svg>
