<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Anticoagulation Reversal — Emergency Reference</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Time-critical — identify the agent and reverse immediately. Do not wait for full labs to treat.</text>

  <!-- Warfarin column -->
  <rect x="20" y="60" width="155" height="300" rx="8" fill="#eff6ff" stroke="#3b82f6" stroke-width="2"/>
  <rect x="20" y="60" width="155" height="30" rx="8" fill="#2563eb"/>
  <rect x="20" y="78" width="155" height="12" fill="#2563eb"/>
  <text x="97" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="white">Warfarin / VKA</text>
  <text x="97" y="100" text-anchor="middle" font-size="10" fill="#1e40af">INR check first</text>
  <line x1="28" y1="107" x2="167" y2="107" stroke="#bfdbfe" stroke-width="1"/>
  <text x="35" y="122" font-size="10" font-weight="700" fill="#1d4ed8">Reversal agents:</text>
  <text x="35" y="138" font-size="10" fill="#1e3a5f">1. 4F-PCC (Kcentra)</text>
  <text x="35" y="152" font-size="10" fill="#1e3a5f">   INR 2-4: 25 units/kg</text>
  <text x="35" y="166" font-size="10" fill="#1e3a5f">   INR 4-6: 35 units/kg</text>
  <text x="35" y="180" font-size="10" fill="#1e3a5f">   INR &gt;6: 50 units/kg</text>
  <line x1="28" y1="188" x2="167" y2="188" stroke="#bfdbfe" stroke-width="1"/>
  <text x="35" y="204" font-size="10" fill="#1e3a5f">2. Vit K 10mg IV slow</text>
  <text x="35" y="218" font-size="10" fill="#64748b">   (over 20-60 min)</text>
  <text x="35" y="232" font-size="10" fill="#64748b">   Hours to effect</text>
  <line x1="28" y1="240" x2="167" y2="240" stroke="#bfdbfe" stroke-width="1"/>
  <text x="35" y="256" font-size="10" fill="#1e3a5f">3. FFP if PCC unavail.</text>
  <text x="35" y="270" font-size="10" fill="#64748b">   4 units (slower, volume)</text>
  <rect x="28" y="285" width="139" height="30" rx="4" fill="#dbeafe"/>
  <text x="97" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#1d4ed8">Goal INR &lt;1.5</text>
  <text x="97" y="314" text-anchor="middle" font-size="9" fill="#1e40af">Recheck in 30 min</text>

  <!-- Heparin column -->
  <rect x="185" y="60" width="155" height="300" rx="8" fill="#f0fdf4" stroke="#16a34a" stroke-width="2"/>
  <rect x="185" y="60" width="155" height="30" rx="8" fill="#16a34a"/>
  <rect x="185" y="78" width="155" height="12" fill="#16a34a"/>
  <text x="262" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="white">UFH / LMWH</text>
  <text x="262" y="100" text-anchor="middle" font-size="10" fill="#15803d">Anti-Xa or PTT</text>
  <line x1="193" y1="107" x2="332" y2="107" stroke="#bbf7d0" stroke-width="1"/>
  <text x="200" y="122" font-size="10" font-weight="700" fill="#15803d">UFH reversal:</text>
  <text x="200" y="138" font-size="10" fill="#1e3a5f">Protamine sulfate</text>
  <text x="200" y="152" font-size="10" fill="#1e3a5f">1 mg per 100 units UFH</text>
  <text x="200" y="166" font-size="10" fill="#64748b">given in last 2h</text>
  <text x="200" y="180" font-size="10" fill="#64748b">Max 50 mg IV slow</text>
  <line x1="193" y1="188" x2="332" y2="188" stroke="#bbf7d0" stroke-width="1"/>
  <text x="200" y="204" font-size="10" font-weight="700" fill="#15803d">LMWH reversal:</text>
  <text x="200" y="220" font-size="10" fill="#1e3a5f">Protamine (partial)</text>
  <text x="200" y="234" font-size="10" fill="#64748b">1 mg per 1 mg enoxaparin</text>
  <text x="200" y="248" font-size="10" fill="#64748b">if given &lt;8h ago</text>
  <text x="200" y="262" font-size="10" fill="#64748b">Only ~60% effective</text>
  <rect x="193" y="285" width="139" height="30" rx="4" fill="#dcfce7"/>
  <text x="262" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">Stop infusion FIRST</text>
  <text x="262" y="314" text-anchor="middle" font-size="9" fill="#166534">Half-life: UFH ~90 min</text>

  <!-- DOAC column: Xa inhibitors -->
  <rect x="350" y="60" width="155" height="300" rx="8" fill="#fff7ed" stroke="#ea580c" stroke-width="2"/>
  <rect x="350" y="60" width="155" height="30" rx="8" fill="#ea580c"/>
  <rect x="350" y="78" width="155" height="12" fill="#ea580c"/>
  <text x="427" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="white">Factor Xa Inhibitors</text>
  <text x="427" y="100" text-anchor="middle" font-size="10" fill="#9a3412">rivaroxaban, apixaban, edoxaban</text>
  <line x1="358" y1="107" x2="497" y2="107" stroke="#fed7aa" stroke-width="1"/>
  <text x="365" y="122" font-size="10" font-weight="700" fill="#9a3412">Reversal agent:</text>
  <text x="365" y="138" font-size="10" fill="#1e3a5f">Andexanet alfa (Andexxa)</text>
  <text x="365" y="152" font-size="10" fill="#64748b">Low dose: 400mg bolus</text>
  <text x="365" y="166" font-size="10" fill="#64748b">  + 4mg/min × 120 min</text>
  <text x="365" y="180" font-size="10" fill="#64748b">High dose: 800mg bolus</text>
  <text x="365" y="194" font-size="10" fill="#64748b">  + 8mg/min × 120 min</text>
  <line x1="358" y1="202" x2="497" y2="202" stroke="#fed7aa" stroke-width="1"/>
  <text x="365" y="218" font-size="10" fill="#1e3a5f">If unavailable:</text>
  <text x="365" y="232" font-size="10" fill="#1e3a5f">4F-PCC 50 units/kg</text>
  <text x="365" y="246" font-size="10" fill="#64748b">(off-label, partial reversal)</text>
  <rect x="358" y="285" width="139" height="30" rx="4" fill="#ffedd5"/>
  <text x="427" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#c2410c">Last dose timing critical</text>
  <text x="427" y="314" text-anchor="middle" font-size="9" fill="#9a3412">High dose if &lt;8h or Xa inhib dose</text>

  <!-- Dabigatran column -->
  <rect x="515" y="60" width="165" height="300" rx="8" fill="#fdf4ff" stroke="#9333ea" stroke-width="2"/>
  <rect x="515" y="60" width="165" height="30" rx="8" fill="#9333ea"/>
  <rect x="515" y="78" width="165" height="12" fill="#9333ea"/>
  <text x="597" y="81" text-anchor="middle" font-size="12" font-weight="700" fill="white">Dabigatran (DTI)</text>
  <text x="597" y="100" text-anchor="middle" font-size="10" fill="#6b21a8">Pradaxa — thrombin inhibitor</text>
  <line x1="523" y1="107" x2="672" y2="107" stroke="#e9d5ff" stroke-width="1"/>
  <text x="530" y="122" font-size="10" font-weight="700" fill="#6b21a8">Reversal agent:</text>
  <text x="530" y="138" font-size="10" fill="#1e3a5f">Idarucizumab (Praxbind)</text>
  <text x="530" y="152" font-size="10" fill="#1e3a5f">5g IV (two 2.5g vials)</text>
  <text x="530" y="166" font-size="10" fill="#64748b">Given over 5-10 min</text>
  <text x="530" y="180" font-size="10" fill="#64748b">Complete reversal</text>
  <text x="530" y="194" font-size="10" fill="#64748b">within minutes</text>
  <line x1="523" y1="202" x2="672" y2="202" stroke="#e9d5ff" stroke-width="1"/>
  <text x="530" y="218" font-size="10" fill="#1e3a5f">If unavailable:</text>
  <text x="530" y="232" font-size="10" fill="#1e3a5f">4F-PCC 50 units/kg</text>
  <text x="530" y="246" font-size="10" fill="#64748b">Dialysis removes dabigatran</text>
  <text x="530" y="260" font-size="10" fill="#64748b">(high protein binding = poor)</text>
  <rect x="523" y="285" width="139" height="30" rx="4" fill="#f3e8ff"/>
  <text x="597" y="300" text-anchor="middle" font-size="10" font-weight="700" fill="#7e22ce">dTT or diluted TT</text>
  <text x="597" y="314" text-anchor="middle" font-size="9" fill="#6b21a8">to confirm activity</text>

  <!-- Bottom bar -->
  <rect x="20" y="370" width="660" height="24" rx="6" fill="#1e3a5f"/>
  <text x="350" y="386" text-anchor="middle" font-size="11" fill="white" font-weight="600">Identify agent → Last dose → Creatinine (DOAC clearance) → Activate pharmacy/hematology immediately</text>
</svg>
