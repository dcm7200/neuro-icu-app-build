<svg width="700" height="380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>

  <!-- Title / Subtitle -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">CT Head Windowing and Hounsfield Units</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Changing window settings reveals different pathology — switch to stroke window for early ischemia.</text>
  <line x1="16" y1="57" x2="684" y2="57" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ── HU SCALE BAR ── -->
  <text x="350" y="73" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">Hounsfield Unit (HU) Scale</text>

  <!-- HU gradient bar segments -->
  <!-- Air: -1000 -->
  <rect x="16"  y="80" width="68" height="40" fill="#000000" rx="4"/>
  <text x="50"  y="95" text-anchor="middle" font-size="9" fill="white" font-weight="700">Air</text>
  <text x="50"  y="109" text-anchor="middle" font-size="8.5" fill="#94a3b8">−1000 HU</text>

  <!-- Fat: -100 to -50 -->
  <rect x="88"  y="80" width="68" height="40" fill="#1c1c1c" rx="4"/>
  <text x="122" y="95" text-anchor="middle" font-size="9" fill="#d1d5db" font-weight="700">Fat</text>
  <text x="122" y="109" text-anchor="middle" font-size="8.5" fill="#9ca3af">−100 to −50 HU</text>

  <!-- Water/CSF: 0 -->
  <rect x="160" y="80" width="68" height="40" fill="#374151" rx="4"/>
  <text x="194" y="95" text-anchor="middle" font-size="9" fill="#d1d5db" font-weight="700">Water/CSF</text>
  <text x="194" y="109" text-anchor="middle" font-size="8.5" fill="#9ca3af">0 HU</text>

  <!-- White matter: 20-30 -->
  <rect x="232" y="80" width="68" height="40" fill="#6b7280" rx="4"/>
  <text x="266" y="95" text-anchor="middle" font-size="9" fill="white" font-weight="700">White Matter</text>
  <text x="266" y="109" text-anchor="middle" font-size="8.5" fill="#e5e7eb">20–30 HU</text>

  <!-- Gray matter: 35-45 -->
  <rect x="304" y="80" width="68" height="40" fill="#9ca3af" rx="4"/>
  <text x="338" y="95" text-anchor="middle" font-size="9" fill="white" font-weight="700">Gray Matter</text>
  <text x="338" y="109" text-anchor="middle" font-size="8.5" fill="white">35–45 HU</text>

  <!-- Fresh blood: 50-80 -->
  <rect x="376" y="80" width="88" height="40" fill="#d4d4d4" rx="4" stroke="#ef4444" stroke-width="1.5"/>
  <text x="420" y="95" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="700">Acute Blood</text>
  <text x="420" y="109" text-anchor="middle" font-size="8.5" fill="#374151">50–80 HU (bright)</text>

  <!-- Calcification/bone: >100 -->
  <rect x="468" y="80" width="68" height="40" fill="#f3f4f6" rx="4" stroke="#6b7280" stroke-width="1"/>
  <text x="502" y="95" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="700">Calcium/Bone</text>
  <text x="502" y="109" text-anchor="middle" font-size="8.5" fill="#374151">&gt;100 HU (white)</text>

  <!-- Metal: very bright -->
  <rect x="540" y="80" width="68" height="40" fill="white" rx="4" stroke="#6b7280" stroke-width="1"/>
  <text x="574" y="95" text-anchor="middle" font-size="9" fill="#1e3a5f" font-weight="700">Metal/Hardware</text>
  <text x="574" y="109" text-anchor="middle" font-size="8.5" fill="#374151">&gt;1000 HU</text>

  <!-- Scale arrow -->
  <line x1="16" y1="128" x2="614" y2="128" stroke="#e2e8f0" stroke-width="1"/>
  <text x="16"  y="140" font-size="9" fill="#64748b">← Darker (low HU)</text>
  <text x="614" y="140" text-anchor="end" font-size="9" fill="#64748b">Brighter (high HU) →</text>

  <!-- ── WINDOW PRESETS ── -->
  <text x="350" y="160" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">CT Window Presets</text>

  <!-- Brain Window -->
  <rect x="16"  y="166" width="210" height="108" fill="#f1f5f9" rx="8" stroke="#64748b" stroke-width="1.5"/>
  <rect x="16"  y="166" width="210" height="24" fill="#475569" rx="8"/>
  <rect x="16"  y="178" width="210" height="12" fill="#475569"/>
  <text x="121" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="white">🧠 Brain Window</text>
  <text x="121" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">C40 / W80</text>
  <text x="121" y="214" text-anchor="middle" font-size="9.5" fill="#64748b">Visible HU range: 0 to 80</text>
  <text x="28"  y="232" font-size="10" fill="#1e3a5f">• Standard anatomy overview</text>
  <text x="28"  y="246" font-size="10" fill="#1e3a5f">• Subdural / epidural hematoma</text>
  <text x="28"  y="260" font-size="10" fill="#1e3a5f">• Parenchymal hemorrhage</text>

  <!-- Stroke Window (highlighted - most important) -->
  <rect x="242" y="166" width="218" height="108" fill="#eff6ff" rx="8" stroke="#3b82f6" stroke-width="2.5"/>
  <rect x="242" y="166" width="218" height="24" fill="#3b82f6" rx="8"/>
  <rect x="242" y="178" width="218" height="12" fill="#3b82f6"/>
  <text x="351" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="white">⚡ STROKE Window ★</text>
  <text x="351" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">C40 / W40</text>
  <text x="351" y="214" text-anchor="middle" font-size="9.5" fill="#3b82f6">Visible HU range: 20 to 60</text>
  <text x="254" y="232" font-size="10" fill="#1e3a5f">• Early ischemia (2–6h onset)</text>
  <text x="254" y="246" font-size="10" fill="#1e3a5f">• Gray-white differentiation loss</text>
  <text x="254" y="260" font-size="10" fill="#1e3a5f">• MCA territory subtle changes</text>

  <!-- Bone Window -->
  <rect x="476" y="166" width="208" height="108" fill="#f8fafc" rx="8" stroke="#64748b" stroke-width="1.5"/>
  <rect x="476" y="166" width="208" height="24" fill="#334155" rx="8"/>
  <rect x="476" y="178" width="208" height="12" fill="#334155"/>
  <text x="580" y="183" text-anchor="middle" font-size="12" font-weight="700" fill="white">💀 Bone Window</text>
  <text x="580" y="200" text-anchor="middle" font-size="11" font-weight="700" fill="#1e3a5f">C600 / W2000</text>
  <text x="580" y="214" text-anchor="middle" font-size="9.5" fill="#64748b">Visible HU: −400 to 1600</text>
  <text x="488" y="232" font-size="10" fill="#1e3a5f">• Skull fractures</text>
  <text x="488" y="246" font-size="10" fill="#1e3a5f">• Temporal bone pathology</text>
  <text x="488" y="260" font-size="10" fill="#1e3a5f">• Orbital wall fractures</text>

  <!-- Clinical pearl box -->
  <rect x="16" y="284" width="668" height="84" fill="#eff6ff" rx="8" stroke="#3b82f6" stroke-width="2"/>
  <rect x="16" y="284" width="668" height="24" fill="#3b82f6" rx="8"/>
  <rect x="16" y="296" width="668" height="12" fill="#3b82f6"/>
  <text x="350" y="301" text-anchor="middle" font-size="12" font-weight="700" fill="white">⚡ CLINICAL PEARL — Use STROKE WINDOW (C40/W40) for Suspected Ischemia</text>
  <text x="30"  y="322" font-size="10" fill="#1e3a5f" font-weight="600">Signs visible 2–6h before standard window reveals infarct:</text>
  <text x="30"  y="336" font-size="10" fill="#1e3a5f">• <tspan font-weight="700">Insular ribbon sign</tspan> — loss of insular cortex gray-white junction</text>
  <text x="240" y="336" font-size="10" fill="#1e3a5f">• <tspan font-weight="700">Dense MCA sign</tspan> — hyperdense thrombus in MCA on non-contrast CT</text>
  <text x="30"  y="352" font-size="10" fill="#1e3a5f">• <tspan font-weight="700">Loss of basal ganglia outline</tspan> — subtle early infarct sign in lenticular nucleus</text>
  <text x="30"  y="364" font-size="10" fill="#1e3a5f">• ASPECTS &lt;6 on CT = large territory infarct (affects tPA/thrombectomy decision)</text>
</svg>
