<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="30" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">ICP Waveform Morphology</text>
  <text x="350" y="50" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">P1 (percussion) &gt; P2 (tidal) &gt; P3 (dicrotic) in the normal brain</text>

  <!-- === NORMAL WAVEFORM (left panel) === -->
  <rect x="20" y="65" width="320" height="230" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="180" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#15803d">NORMAL ICP (&lt;15 mmHg)</text>
  <text x="180" y="100" text-anchor="middle" font-size="11" fill="#64748b">P1 &gt; P2 &gt; P3 — good compliance</text>

  <!-- Normal waveform line (3 cycles) -->
  <!-- Each cycle: baseline rise to P1, small dip, P2 (lower than P1), dip, P3 (lowest), return to baseline -->
  <!-- Baseline y=240, P1 peak y=155, P2 peak y=170, P3 peak y=185 -->
  <!-- Cycle width ~85px, 3 cycles from x=35 to x=320 -->

  <!-- Cycle 1 -->
  <polyline points="
    35,240 50,240 55,158 65,172 72,180 80,240
    85,240 90,158 100,172 107,180 115,240
    120,240 125,158 135,172 142,180 150,240
  " fill="none" stroke="#16a34a" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- P1, P2, P3 labels on first cycle -->
  <text x="55" y="150" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">P1</text>
  <line x1="55" y1="153" x2="55" y2="160" stroke="#15803d" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="68" y="165" text-anchor="middle" font-size="10" fill="#0f766e">P2</text>
  <line x1="65" y1="167" x2="65" y2="173" stroke="#0f766e" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="78" y="177" text-anchor="middle" font-size="10" fill="#0891b2">P3</text>
  <line x1="72" y1="179" x2="72" y2="181" stroke="#0891b2" stroke-width="1" stroke-dasharray="2,2"/>

  <!-- Baseline label -->
  <line x1="30" y1="240" x2="155" y2="240" stroke="#cbd5e1" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="162" y="244" font-size="10" fill="#94a3b8">baseline</text>

  <!-- ICP scale indicator -->
  <line x1="32" y1="155" x2="32" y2="242" stroke="#94a3b8" stroke-width="1"/>
  <line x1="29" y1="155" x2="35" y2="155" stroke="#94a3b8" stroke-width="1"/>
  <line x1="29" y1="242" x2="35" y2="242" stroke="#94a3b8" stroke-width="1"/>
  <text x="24" y="204" text-anchor="middle" font-size="9" fill="#64748b" transform="rotate(-90 24 204)">~10 mmHg</text>

  <!-- Compliance note -->
  <rect x="35" y="260" width="290" height="26" rx="4" fill="#dcfce7"/>
  <text x="180" y="277" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">&#x2713; Good compliance — buffer available</text>

  <!-- === ELEVATED ICP WAVEFORM (right panel) === -->
  <rect x="360" y="65" width="320" height="230" rx="8" fill="white" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="520" y="85" text-anchor="middle" font-size="13" font-weight="700" fill="#dc2626">ELEVATED ICP (&gt;20 mmHg)</text>
  <text x="520" y="100" text-anchor="middle" font-size="11" fill="#64748b">P2 &gt; P1 — compliance exhausted</text>

  <!-- Elevated waveform: P1 and P2 both high, P2 now exceeds P1, more rounded -->
  <!-- Baseline y=240, P1 peak y=160, P2 peak y=150 (now higher), P3=165 -->
  <polyline points="
    375,230 390,230 395,162 405,148 412,158 420,230
    425,230 430,162 440,148 447,158 455,230
    460,230 465,162 475,148 482,158 490,230
  " fill="none" stroke="#dc2626" stroke-width="2.5" stroke-linejoin="round" stroke-linecap="round"/>

  <!-- P1, P2, P3 labels -->
  <text x="396" y="154" text-anchor="middle" font-size="11" font-weight="700" fill="#b91c1c">P1</text>
  <line x1="396" y1="157" x2="396" y2="164" stroke="#b91c1c" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="410" y="141" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">P2</text>
  <line x1="406" y1="143" x2="406" y2="150" stroke="#dc2626" stroke-width="1" stroke-dasharray="2,2"/>

  <text x="418" y="155" text-anchor="middle" font-size="10" fill="#ef4444">P3</text>

  <!-- Arrow showing P2 > P1 -->
  <text x="520" y="150" text-anchor="middle" font-size="13" fill="#dc2626" font-weight="700">P2 &gt; P1 = &#x26A0; ALARM</text>

  <!-- Baseline label -->
  <line x1="370" y1="230" x2="495" y2="230" stroke="#fca5a5" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="500" y="234" font-size="10" fill="#94a3b8">baseline &#x2191;</text>

  <!-- Compliance note -->
  <rect x="375" y="260" width="290" height="26" rx="4" fill="#fee2e2"/>
  <text x="520" y="277" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">&#x26A0; Compliance lost — small volume = big ICP</text>

  <!-- Plateau wave reference box -->
  <rect x="20" y="308" width="660" height="58" rx="8" fill="#1e3a5f"/>
  <text x="350" y="325" text-anchor="middle" font-size="12" font-weight="700" fill="#fbbf24">&#x26A0; Lundberg Waves — Know These</text>
  <text x="168" y="342" text-anchor="middle" font-size="11" fill="#93c5fd" font-weight="600">A-waves (Plateau)</text>
  <text x="168" y="356" text-anchor="middle" font-size="10" fill="#e2e8f0">ICP 50-100 mmHg, 5-20 min — EMERGENCY</text>
  <text x="350" y="342" text-anchor="middle" font-size="11" fill="#6ee7b7" font-weight="600">B-waves</text>
  <text x="350" y="356" text-anchor="middle" font-size="10" fill="#e2e8f0">ICP 20-50 mmHg, 0.5-2 min — warning sign</text>
  <text x="530" y="342" text-anchor="middle" font-size="11" fill="#a5f3fc" font-weight="600">C-waves</text>
  <text x="530" y="356" text-anchor="middle" font-size="10" fill="#e2e8f0">Small oscillations — less significant</text>
</svg>
