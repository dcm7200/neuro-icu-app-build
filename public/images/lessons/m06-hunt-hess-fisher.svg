<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>

  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">aSAH Grading: Hunt-Hess and Fisher Scales</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Hunt-Hess = clinical severity. Fisher/modified Fisher = CT-based vasospasm risk.</text>

  <!-- HUNT-HESS (left) -->
  <rect x="20" y="60" width="330" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="20" y="60" width="330" height="32" rx="8" fill="#7c3aed"/>
  <rect x="20" y="80" width="330" height="12" fill="#7c3aed"/>
  <text x="185" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="white">Hunt-Hess Grade</text>

  <!-- Grade rows -->
  <!-- Grade 1 -->
  <rect x="30" y="100" width="48" height="46" rx="4" fill="#22c55e"/>
  <text x="54" y="120" text-anchor="middle" font-size="16" font-weight="700" fill="white">1</text>
  <text x="54" y="136" text-anchor="middle" font-size="9" fill="white">5-20%</text>
  <text x="90" y="118" font-size="11" fill="#334155" font-weight="600">Asymptomatic OR mild HA</text>
  <text x="90" y="134" font-size="10" fill="#64748b">Slight nuchal rigidity. No neuro deficit.</text>
  <text x="90" y="146" font-size="10" fill="#15803d" font-weight="600">Mortality: ~5%</text>
  <line x1="28" y1="148" x2="342" y2="148" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 2 -->
  <rect x="30" y="152" width="48" height="46" rx="4" fill="#84cc16"/>
  <text x="54" y="172" text-anchor="middle" font-size="16" font-weight="700" fill="white">2</text>
  <text x="54" y="188" text-anchor="middle" font-size="9" fill="white">~25%</text>
  <text x="90" y="170" font-size="11" fill="#334155" font-weight="600">Moderate-severe HA, nuchal rigidity</text>
  <text x="90" y="186" font-size="10" fill="#64748b">No neuro deficit except CN palsy</text>
  <text x="90" y="198" font-size="10" fill="#65a30d" font-weight="600">Mortality: ~10%</text>
  <line x1="28" y1="200" x2="342" y2="200" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 3 -->
  <rect x="30" y="204" width="48" height="46" rx="4" fill="#f59e0b"/>
  <text x="54" y="224" text-anchor="middle" font-size="16" font-weight="700" fill="white">3</text>
  <text x="54" y="240" text-anchor="middle" font-size="9" fill="white">~35%</text>
  <text x="90" y="222" font-size="11" fill="#334155" font-weight="600">Drowsy, mild focal deficit</text>
  <text x="90" y="238" font-size="10" fill="#64748b">Confused but arousable</text>
  <text x="90" y="250" font-size="10" fill="#d97706" font-weight="600">Mortality: ~20%</text>
  <line x1="28" y1="252" x2="342" y2="252" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 4 -->
  <rect x="30" y="256" width="48" height="46" rx="4" fill="#ef4444"/>
  <text x="54" y="276" text-anchor="middle" font-size="16" font-weight="700" fill="white">4</text>
  <text x="54" y="292" text-anchor="middle" font-size="9" fill="white">~60%</text>
  <text x="90" y="274" font-size="11" fill="#334155" font-weight="600">Stupor, moderate-severe deficit</text>
  <text x="90" y="290" font-size="10" fill="#64748b">Early decerebrate rigidity, vegetative</text>
  <text x="90" y="302" font-size="10" fill="#dc2626" font-weight="600">Mortality: ~40%</text>
  <line x1="28" y1="304" x2="342" y2="304" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 5 -->
  <rect x="30" y="308" width="48" height="44" rx="4" fill="#7f1d1d"/>
  <text x="54" y="328" text-anchor="middle" font-size="16" font-weight="700" fill="white">5</text>
  <text x="54" y="344" text-anchor="middle" font-size="9" fill="#fca5a5">&gt;80%</text>
  <text x="90" y="326" font-size="11" fill="#334155" font-weight="600">Coma, decerebrate posturing</text>
  <text x="90" y="342" font-size="10" fill="#64748b">Moribund appearance</text>
  <text x="90" y="355" font-size="10" fill="#991b1b" font-weight="600">Mortality: &gt;80%</text>

  <!-- MODIFIED FISHER (right) -->
  <rect x="365" y="60" width="315" height="300" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <rect x="365" y="60" width="315" height="32" rx="8" fill="#0891b2"/>
  <rect x="365" y="80" width="315" height="12" fill="#0891b2"/>
  <text x="522" y="82" text-anchor="middle" font-size="13" font-weight="700" fill="white">Modified Fisher Scale</text>

  <!-- Column headers -->
  <text x="405" y="102" font-size="10" font-weight="700" fill="#64748b">Grade</text>
  <text x="460" y="102" font-size="10" font-weight="700" fill="#64748b">CT Appearance</text>
  <text x="655" y="102" text-anchor="middle" font-size="10" font-weight="700" fill="#64748b">Vasospasm Risk</text>
  <line x1="373" y1="107" x2="672" y2="107" stroke="#e2e8f0" stroke-width="1"/>

  <!-- Grade 0 -->
  <text x="405" y="124" font-size="12" font-weight="700" fill="#22c55e">0</text>
  <text x="450" y="124" font-size="11" fill="#334155">No SAH, no IVH</text>
  <text x="655" y="124" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">Minimal</text>
  <line x1="373" y1="132" x2="672" y2="132" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 1 -->
  <text x="405" y="152" font-size="12" font-weight="700" fill="#84cc16">1</text>
  <text x="450" y="149" font-size="11" fill="#334155">Thin SAH (&lt;1mm),</text>
  <text x="450" y="164" font-size="11" fill="#334155">no IVH</text>
  <text x="655" y="158" text-anchor="middle" font-size="11" fill="#65a30d" font-weight="600">Low (24%)</text>
  <line x1="373" y1="174" x2="672" y2="174" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 2 -->
  <text x="405" y="192" font-size="12" font-weight="700" fill="#f59e0b">2</text>
  <text x="450" y="190" font-size="11" fill="#334155">Thin SAH,</text>
  <text x="450" y="205" font-size="11" fill="#334155">with IVH</text>
  <text x="655" y="198" text-anchor="middle" font-size="11" fill="#d97706" font-weight="600">Moderate (33%)</text>
  <line x1="373" y1="214" x2="672" y2="214" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 3 -->
  <text x="405" y="232" font-size="12" font-weight="700" fill="#ef4444">3</text>
  <text x="450" y="230" font-size="11" fill="#334155">Thick SAH (&gt;1mm),</text>
  <text x="450" y="245" font-size="11" fill="#334155">no IVH</text>
  <text x="655" y="238" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="600">High (33%)</text>
  <line x1="373" y1="254" x2="672" y2="254" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Grade 4 -->
  <text x="405" y="272" font-size="12" font-weight="700" fill="#7f1d1d">4</text>
  <text x="450" y="270" font-size="11" fill="#334155">Thick SAH,</text>
  <text x="450" y="285" font-size="11" fill="#334155">with IVH</text>
  <text x="655" y="278" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">HIGHEST (40%)</text>
  <line x1="373" y1="294" x2="672" y2="294" stroke="#f1f5f9" stroke-width="1"/>

  <!-- Vasospasm window note -->
  <rect x="373" y="300" width="286" height="52" rx="6" fill="#fef3c7"/>
  <text x="516" y="317" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">&#x26A0; Vasospasm Window</text>
  <text x="516" y="332" text-anchor="middle" font-size="10" fill="#713f12">Onset: Day 3-5 post-SAH</text>
  <text x="516" y="347" text-anchor="middle" font-size="10" fill="#713f12">Peak: Day 7-10 | Risk ends: ~Day 21</text>

  <!-- Bottom clinical note -->
  <rect x="20" y="370" width="660" height="24" rx="6" fill="#1e3a5f"/>
  <text x="350" y="386" text-anchor="middle" font-size="11" fill="white" font-weight="600">Hunt-Hess &#x2265;3 OR Fisher &#x2265;3: high vigilance for vasospasm, delayed cerebral ischemia (DCI), and rebleeding</text>
</svg>
