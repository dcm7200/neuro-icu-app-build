<svg width="700" height="480" viewBox="0 0 700 480" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="480" fill="#f8fafc" rx="12"/>

  <!-- Title -->
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Acute Ischemic Stroke: IV tPA Eligibility</text>
  <text x="350" y="47" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Time is brain — 1.9 million neurons lost per minute in LVO. Door-to-needle goal: &lt;60 min.</text>

  <!-- Step 1: Time window -->
  <rect x="220" y="58" width="260" height="44" rx="8" fill="#3b82f6"/>
  <text x="350" y="76" text-anchor="middle" font-size="13" font-weight="700" fill="white">ONSET &#x2264;4.5 HOURS?</text>
  <text x="350" y="94" text-anchor="middle" font-size="11" fill="#dbeafe">(or last known well &#x2264;4.5h ago)</text>

  <!-- Yes/No branches -->
  <!-- NO branch -->
  <line x1="220" y1="80" x2="130" y2="80" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="175" y="74" text-anchor="middle" font-size="11" fill="#dc2626" font-weight="700">NO</text>
  <rect x="30" y="62" width="95" height="36" rx="6" fill="#fde8e8" stroke="#dc2626" stroke-width="1.5"/>
  <text x="77" y="76" text-anchor="middle" font-size="10" fill="#991b1b" font-weight="700">No IV tPA</text>
  <text x="77" y="90" text-anchor="middle" font-size="9" fill="#991b1b">Consider thrombectomy</text>

  <!-- YES branch down -->
  <line x1="350" y1="102" x2="350" y2="122" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="364" y="116" font-size="11" fill="#16a34a" font-weight="700">YES</text>

  <!-- Step 2: Contraindications -->
  <rect x="175" y="123" width="350" height="44" rx="8" fill="#1e3a5f"/>
  <text x="350" y="141" text-anchor="middle" font-size="13" font-weight="700" fill="white">CHECK ABSOLUTE CONTRAINDICATIONS</text>
  <text x="350" y="158" text-anchor="middle" font-size="10" fill="#93c5fd">(any one = NO tPA)</text>

  <!-- Contraindications list -->
  <rect x="60" y="178" width="580" height="100" rx="8" fill="#fff1f2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="350" y="196" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Absolute Contraindications</text>
  <text x="80" y="214" font-size="11" fill="#7f1d1d">&#x2022; BP &gt;185/110 despite treatment</text>
  <text x="80" y="229" font-size="11" fill="#7f1d1d">&#x2022; Active internal bleeding / hemorrhage on CT</text>
  <text x="80" y="244" font-size="11" fill="#7f1d1d">&#x2022; Recent (&lt;3 mo) intracranial/spinal surgery, serious head trauma, prior stroke</text>
  <text x="380" y="214" font-size="11" fill="#7f1d1d">&#x2022; INR &gt;1.7, PTT &gt;40, platelets &lt;100K</text>
  <text x="380" y="229" font-size="11" fill="#7f1d1d">&#x2022; Glucose &lt;50 mg/dL</text>
  <text x="380" y="244" font-size="11" fill="#7f1d1d">&#x2022; Endocarditis / aortic dissection</text>
  <text x="80" y="270" font-size="11" fill="#7f1d1d">&#x2022; DOAC use within 48h (or any if levels elevated) &#x2022; heparin within 48h with elevated PTT</text>

  <line x1="350" y1="280" x2="350" y2="298" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>
  <text x="365" y="293" font-size="11" fill="#16a34a" font-weight="700">NONE present</text>

  <!-- Step 3: Relative contraindications -->
  <rect x="175" y="300" width="350" height="36" rx="8" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="350" y="316" text-anchor="middle" font-size="12" font-weight="700" fill="#92400e">REVIEW RELATIVE CONTRAINDICATIONS</text>
  <text x="350" y="330" text-anchor="middle" font-size="10" fill="#92400e">(discuss risk/benefit — neurology decision)</text>

  <!-- Relative CI list -->
  <rect x="60" y="344" width="580" height="36" rx="6" fill="#fefce8" stroke="#fde68a" stroke-width="1.5"/>
  <text x="180" y="358" text-anchor="middle" font-size="10" fill="#713f12">Age &gt;80 (3-4.5h window)</text>
  <text x="350" y="358" text-anchor="middle" font-size="10" fill="#713f12">Severe stroke (NIHSS &gt;25)</text>
  <text x="520" y="358" text-anchor="middle" font-size="10" fill="#713f12">Prior stroke + DM</text>
  <text x="180" y="372" text-anchor="middle" font-size="10" fill="#713f12">Major surgery &lt;14 days</text>
  <text x="350" y="372" text-anchor="middle" font-size="10" fill="#713f12">GI/urinary bleed &lt;21 days</text>
  <text x="520" y="372" text-anchor="middle" font-size="10" fill="#713f12">MI &lt;3 months</text>

  <line x1="350" y1="382" x2="350" y2="400" stroke="#94a3b8" stroke-width="2" marker-end="url(#arr)"/>

  <!-- tPA dose box -->
  <rect x="130" y="400" width="440" height="68" rx="8" fill="#166534" stroke="#15803d" stroke-width="2"/>
  <text x="350" y="420" text-anchor="middle" font-size="13" font-weight="700" fill="white">&#x2705; GIVE IV tPA (Alteplase)</text>
  <text x="350" y="440" text-anchor="middle" font-size="12" fill="#bbf7d0">0.9 mg/kg (max 90 mg)</text>
  <text x="350" y="458" text-anchor="middle" font-size="11" fill="#86efac">10% as bolus over 1 min | 90% infused over 60 min</text>
  <text x="350" y="472" text-anchor="middle" font-size="10" fill="#6ee7b7">Immediately obtain CTA head/neck — thrombectomy eval if LVO</text>

  <defs>
    <marker id="arr" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
