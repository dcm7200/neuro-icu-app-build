<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Guillain-Barré Syndrome: Respiratory Monitoring</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">GBS is the most common cause of acute flaccid paralysis. 30% need intubation. Rule of 20-30.</text>

  <!-- Rule of 20-30 box -->
  <rect x="20" y="60" width="300" height="140" rx="8" fill="#fee2e2" stroke="#dc2626" stroke-width="2"/>
  <text x="170" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#991b1b">&#x26A0; The Rule of 20-30</text>
  <text x="170" y="97" text-anchor="middle" font-size="11" fill="#7f1d1d">Intubate when ANY threshold crossed:</text>
  <rect x="35" y="105" width="270" height="28" rx="4" fill="#fca5a5"/>
  <text x="170" y="117" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">FVC &lt; 20 mL/kg</text>
  <text x="170" y="130" text-anchor="middle" font-size="10" fill="#7f1d1d">(normal ~70 mL/kg)</text>
  <rect x="35" y="137" width="270" height="28" rx="4" fill="#fca5a5"/>
  <text x="170" y="149" text-anchor="middle" font-size="12" font-weight="700" fill="#7f1d1d">MIP &lt; -30 cmH₂O</text>
  <text x="170" y="162" text-anchor="middle" font-size="10" fill="#7f1d1d">(max inspiratory pressure)</text>
  <rect x="35" y="169" width="270" height="22" rx="4" fill="#fca5a5"/>
  <text x="170" y="184" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">MEP &lt; 40 cmH₂O (max expiratory)</text>

  <!-- Monitoring frequency box -->
  <rect x="335" y="60" width="345" height="140" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="507" y="80" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Monitoring Schedule</text>
  <text x="350" y="100" font-size="11" fill="#1e3a5f">&#x2022; FVC q2-4h in deteriorating patients</text>
  <text x="350" y="116" font-size="11" fill="#1e3a5f">&#x2022; Serial NIF checks every shift minimum</text>
  <text x="350" y="132" font-size="11" fill="#1e3a5f">&#x2022; Continuous SpO₂ and telemetry</text>
  <text x="350" y="148" font-size="11" fill="#1e3a5f">&#x2022; Autonomic: HR/BP q1h (dysautonomia)</text>
  <text x="350" y="164" font-size="11" fill="#1e3a5f">&#x2022; Swallowing eval (bulbar involvement)</text>
  <text x="350" y="180" font-size="10" fill="#64748b" font-style="italic">SpO₂ stays normal until near-arrest — do NOT rely on it alone</text>

  <!-- GBS progression timeline -->
  <rect x="20" y="215" width="660" height="130" rx="8" fill="white" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="350" y="233" text-anchor="middle" font-size="12" font-weight="700" fill="#1e3a5f">GBS Disease Course and Treatment</text>

  <!-- Timeline -->
  <line x1="50" y1="265" x2="670" y2="265" stroke="#94a3b8" stroke-width="2"/>
  <!-- Phases -->
  <rect x="50" y="245" width="155" height="20" rx="3" fill="#ef4444" opacity="0.7"/>
  <text x="127" y="259" text-anchor="middle" font-size="9" font-weight="700" fill="white">Progressive (Days 0-28)</text>

  <rect x="215" y="245" width="155" height="20" rx="3" fill="#f59e0b" opacity="0.7"/>
  <text x="292" y="259" text-anchor="middle" font-size="9" font-weight="700" fill="white">Plateau (Days 14-28+)</text>

  <rect x="380" y="245" width="290" height="20" rx="3" fill="#22c55e" opacity="0.7"/>
  <text x="525" y="259" text-anchor="middle" font-size="9" font-weight="700" fill="white">Recovery (weeks to months)</text>

  <!-- Treatment boxes below timeline -->
  <rect x="50" y="275" width="290" height="52" rx="4" fill="#fef9c3"/>
  <text x="195" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#92400e">Treatment (start ASAP if severe)</text>
  <text x="195" y="307" text-anchor="middle" font-size="10" fill="#713f12">IVIG 2g/kg over 5 days</text>
  <text x="195" y="321" text-anchor="middle" font-size="10" fill="#713f12">OR PLEX 5 exchanges over 7-14 days</text>

  <rect x="355" y="275" width="315" height="52" rx="4" fill="#f0fdf4"/>
  <text x="512" y="291" text-anchor="middle" font-size="11" font-weight="700" fill="#15803d">Monitoring endpoints</text>
  <text x="512" y="307" text-anchor="middle" font-size="10" fill="#166534">&#x2022; No corticosteroids (worsen outcome)</text>
  <text x="512" y="321" text-anchor="middle" font-size="10" fill="#166534">&#x2022; DVT prophylaxis (paralyzed, high risk)</text>

  <!-- Bottom bar -->
  <rect x="20" y="353" width="660" height="20" rx="4" fill="#1e3a5f"/>
  <text x="350" y="367" text-anchor="middle" font-size="10" fill="white" font-weight="600">Albuminocytologic dissociation on LP (high protein, normal WBC) supports diagnosis. Nerve conduction confirms.</text>
</svg>
