<svg width="700" height="400" viewBox="0 0 700 400" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="400" fill="#f8fafc" rx="12"/>
  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Apnea Test — Step-by-Step Protocol</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">The apnea test confirms brainstem failure. Abort immediately if hemodynamic instability occurs.</text>

  <!-- Step boxes with connecting arrows -->

  <!-- Step 1 -->
  <rect x="30" y="62" width="640" height="50" rx="6" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="60" y="80" font-size="11" font-weight="700" fill="#1d4ed8">Step 1 — Pre-oxygenate (10 min)</text>
  <text x="60" y="98" font-size="10" fill="#1e3a5f">FiO₂ 100% × 10 min | Confirm: SBP ≥100, Temp ≥36°C, no NMB, no sedatives | SpO₂ ≥95%</text>

  <line x1="350" y1="112" x2="350" y2="126" stroke="#94a3b8" stroke-width="2" marker-end="url(#da)"/>

  <!-- Step 2 -->
  <rect x="30" y="127" width="640" height="50" rx="6" fill="#f0fdf4" stroke="#16a34a" stroke-width="1.5"/>
  <text x="60" y="145" font-size="11" font-weight="700" fill="#15803d">Step 2 — Baseline ABG</text>
  <text x="60" y="163" font-size="10" fill="#1e3a5f">Draw arterial blood gas | Target PaCO₂ 35-45 mmHg, PaO₂ &gt;200 mmHg before starting | pH 7.35-7.45</text>

  <line x1="350" y1="177" x2="350" y2="191" stroke="#94a3b8" stroke-width="2" marker-end="url(#da)"/>

  <!-- Step 3 -->
  <rect x="30" y="192" width="640" height="50" rx="6" fill="#fef9c3" stroke="#ca8a04" stroke-width="1.5"/>
  <text x="60" y="210" font-size="11" font-weight="700" fill="#92400e">Step 3 — Disconnect Ventilator (8-10 min observation)</text>
  <text x="60" y="228" font-size="10" fill="#1e3a5f">Place O₂ cannula in ETT at 6L/min (passive O₂ delivery) | Observe closely for any respiratory effort</text>

  <line x1="350" y1="242" x2="350" y2="256" stroke="#94a3b8" stroke-width="2" marker-end="url(#da)"/>

  <!-- Decision: Respiratory effort? -->
  <rect x="200" y="257" width="300" height="36" rx="18" fill="#475569"/>
  <text x="350" y="279" text-anchor="middle" font-size="12" font-weight="700" fill="white">Any respiratory effort?</text>

  <!-- YES branch (abort) -->
  <line x1="200" y1="275" x2="100" y2="275" stroke="#22c55e" stroke-width="2" marker-end="url(#da)"/>
  <text x="150" y="268" text-anchor="middle" font-size="10" fill="#22c55e" font-weight="700">YES</text>
  <rect x="20" y="290" width="170" height="52" rx="6" fill="#dcfce7" stroke="#16a34a" stroke-width="1.5"/>
  <text x="105" y="309" text-anchor="middle" font-size="10" font-weight="700" fill="#15803d">ABORT / NEGATIVE TEST</text>
  <text x="105" y="323" text-anchor="middle" font-size="9" fill="#166534">Reconnect ventilator</text>
  <text x="105" y="337" text-anchor="middle" font-size="9" fill="#166534">Patient is NOT brain dead</text>

  <!-- NO branch (continue) -->
  <line x1="500" y1="275" x2="600" y2="275" stroke="#dc2626" stroke-width="2" marker-end="url(#da)"/>
  <text x="550" y="268" text-anchor="middle" font-size="10" fill="#dc2626" font-weight="700">NO</text>
  <rect x="510" y="290" width="170" height="36" rx="6" fill="#fef9c3"/>
  <text x="595" y="306" text-anchor="middle" font-size="10" fill="#92400e">Continue 8-10 min</text>
  <text x="595" y="320" text-anchor="middle" font-size="10" fill="#92400e">then check ABG</text>

  <line x1="350" y1="293" x2="350" y2="307" stroke="#94a3b8" stroke-width="2" marker-end="url(#da)"/>

  <!-- Step 4: Check ABG -->
  <rect x="30" y="308" width="460" height="36" rx="6" fill="#ffedd5" stroke="#ea580c" stroke-width="1.5"/>
  <text x="260" y="324" text-anchor="middle" font-size="11" font-weight="700" fill="#9a3412">Step 4 — Check ABG After Observation Period</text>
  <text x="260" y="338" text-anchor="middle" font-size="10" fill="#7c2d12">PaCO₂ must be ≥60 mmHg AND rise ≥20 mmHg from baseline = adequate stimulus</text>

  <line x1="350" y1="344" x2="350" y2="358" stroke="#94a3b8" stroke-width="2" marker-end="url(#da)"/>

  <!-- Final: Positive result -->
  <rect x="130" y="358" width="440" height="34" rx="6" fill="#7f1d1d" stroke="#dc2626" stroke-width="2"/>
  <text x="350" y="373" text-anchor="middle" font-size="12" font-weight="700" fill="white">POSITIVE APNEA TEST — No effort + adequate CO₂ rise</text>
  <text x="350" y="388" text-anchor="middle" font-size="10" fill="#fca5a5">Brain death confirmed (with clinical exam). Document time. Notify OPO.</text>

  <!-- Abort conditions box -->
  <rect x="500" y="192" width="170" height="100" rx="6" fill="#fee2e2" stroke="#dc2626" stroke-width="1.5"/>
  <text x="585" y="210" text-anchor="middle" font-size="10" font-weight="700" fill="#dc2626">Abort if:</text>
  <text x="515" y="226" font-size="9" fill="#7f1d1d">&#x2022; SpO₂ &lt;85%</text>
  <text x="515" y="240" font-size="9" fill="#7f1d1d">&#x2022; SBP &lt;90 mmHg</text>
  <text x="515" y="254" font-size="9" fill="#7f1d1d">&#x2022; Cardiac arrhythmia</text>
  <text x="515" y="268" font-size="9" fill="#7f1d1d">&#x2022; &gt;10% SpO₂ drop</text>
  <text x="515" y="282" font-size="9" fill="#dc2626" font-weight="600">→ Use ancillary test</text>

  <defs>
    <marker id="da" markerWidth="7" markerHeight="7" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L7,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
