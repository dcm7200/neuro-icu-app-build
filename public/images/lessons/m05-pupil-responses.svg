<svg width="700" height="380" viewBox="0 0 700 380" xmlns="http://www.w3.org/2000/svg" font-family="system-ui,-apple-system,sans-serif">
  <rect width="700" height="380" fill="#f8fafc" rx="12"/>

  <text x="350" y="28" text-anchor="middle" font-size="17" font-weight="700" fill="#1e3a5f">Pupillary Responses in the NCC Patient</text>
  <text x="350" y="48" text-anchor="middle" font-size="12" fill="#64748b" font-style="italic">Size + reactivity + symmetry. A unilateral blown pupil is an emergency until proven otherwise.</text>

  <!-- Helper: draw pupils as circles with colored fill representing size/reactivity -->

  <!-- Row labels -->
  <text x="100" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Pattern</text>
  <text x="280" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Appearance</text>
  <text x="460" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Localization</text>
  <text x="620" y="78" text-anchor="middle" font-size="12" font-weight="700" fill="#334155">Action</text>
  <line x1="20" y1="83" x2="680" y2="83" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ROW 1: Normal -->
  <rect x="20" y="87" width="660" height="48" rx="0" fill="#f8fafc"/>
  <text x="100" y="107" text-anchor="middle" font-size="11" font-weight="600" fill="#15803d">Normal</text>
  <text x="100" y="122" text-anchor="middle" font-size="10" fill="#64748b">3-4mm, brisk</text>
  <!-- Pupils: both medium, dark (reactive) -->
  <circle cx="255" cy="111" r="11" fill="#1f2937"/>
  <circle cx="255" cy="111" r="5" fill="#4b5563"/>
  <circle cx="305" cy="111" r="11" fill="#1f2937"/>
  <circle cx="305" cy="111" r="5" fill="#4b5563"/>
  <text x="460" y="108" text-anchor="middle" font-size="10" fill="#334155">—</text>
  <text x="620" y="108" text-anchor="middle" font-size="11" fill="#15803d" font-weight="600">Reassuring</text>
  <text x="620" y="122" text-anchor="middle" font-size="10" fill="#64748b">Document baseline</text>
  <line x1="20" y1="135" x2="680" y2="135" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ROW 2: Unilateral fixed dilated -->
  <rect x="20" y="135" width="660" height="52" fill="#fff1f2"/>
  <text x="100" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Unilateral</text>
  <text x="100" y="170" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">Fixed Dilated</text>
  <text x="100" y="184" text-anchor="middle" font-size="10" fill="#64748b">"Blown" pupil</text>
  <!-- Left: small/normal, Right: large/fixed -->
  <circle cx="255" cy="160" r="10" fill="#1f2937"/>
  <circle cx="255" cy="160" r="4" fill="#374151"/>
  <circle cx="305" cy="160" r="17" fill="#6b7280"/>
  <text x="460" y="153" text-anchor="middle" font-size="10" fill="#7f1d1d" font-weight="600">Uncal herniation</text>
  <text x="460" y="167" text-anchor="middle" font-size="10" fill="#7f1d1d">CN III compression</text>
  <text x="460" y="181" text-anchor="middle" font-size="10" fill="#7f1d1d">ipsilateral mass/bleed</text>
  <text x="620" y="153" text-anchor="middle" font-size="11" font-weight="700" fill="#dc2626">CALL NOW</text>
  <text x="620" y="168" text-anchor="middle" font-size="10" fill="#991b1b">Herniation protocol</text>
  <text x="620" y="182" text-anchor="middle" font-size="10" fill="#991b1b">Urgent CT + neurosurg</text>
  <line x1="20" y1="188" x2="680" y2="188" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ROW 3: Bilateral fixed dilated -->
  <rect x="20" y="188" width="660" height="48" fill="#fff1f2"/>
  <text x="100" y="207" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Bilateral</text>
  <text x="100" y="222" text-anchor="middle" font-size="11" font-weight="700" fill="#991b1b">Fixed Dilated</text>
  <circle cx="255" cy="212" r="17" fill="#9ca3af"/>
  <circle cx="305" cy="212" r="17" fill="#9ca3af"/>
  <text x="460" y="206" text-anchor="middle" font-size="10" fill="#7f1d1d">Central herniation</text>
  <text x="460" y="220" text-anchor="middle" font-size="10" fill="#7f1d1d">Brainstem failure</text>
  <text x="460" y="234" text-anchor="middle" font-size="10" fill="#7f1d1d">Anoxia / severe tox</text>
  <text x="620" y="210" text-anchor="middle" font-size="11" font-weight="700" fill="#7f1d1d">EMERGENCY</text>
  <text x="620" y="226" text-anchor="middle" font-size="10" fill="#991b1b">Rule out atropine, tox</text>
  <line x1="20" y1="238" x2="680" y2="238" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ROW 4: Bilateral pinpoint -->
  <rect x="20" y="238" width="660" height="48" fill="#f8fafc"/>
  <text x="100" y="257" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Bilateral</text>
  <text x="100" y="272" text-anchor="middle" font-size="11" font-weight="600" fill="#7c3aed">Pinpoint</text>
  <text x="100" y="286" text-anchor="middle" font-size="10" fill="#64748b">1-2mm</text>
  <circle cx="255" cy="262" r="5" fill="#111827"/>
  <circle cx="305" cy="262" r="5" fill="#111827"/>
  <text x="460" y="254" text-anchor="middle" font-size="10" fill="#334155">Pontine lesion</text>
  <text x="460" y="268" text-anchor="middle" font-size="10" fill="#334155">Opioid toxicity</text>
  <text x="460" y="282" text-anchor="middle" font-size="10" fill="#334155">Severe metabolic enceph.</text>
  <text x="620" y="256" text-anchor="middle" font-size="11" fill="#7c3aed" font-weight="600">Narcan if opioids</text>
  <text x="620" y="270" text-anchor="middle" font-size="10" fill="#334155">MRI brainstem</text>
  <line x1="20" y1="288" x2="680" y2="288" stroke="#e2e8f0" stroke-width="1"/>

  <!-- ROW 5: Horner's -->
  <rect x="20" y="288" width="660" height="48" fill="#f8fafc"/>
  <text x="100" y="307" text-anchor="middle" font-size="11" font-weight="600" fill="#0891b2">Horner's</text>
  <text x="100" y="322" text-anchor="middle" font-size="10" fill="#64748b">miosis + ptosis</text>
  <text x="100" y="336" text-anchor="middle" font-size="10" fill="#64748b">+ anhydrosis</text>
  <!-- One small, one normal -->
  <circle cx="255" cy="312" r="5" fill="#374151"/>
  <circle cx="305" cy="312" r="11" fill="#1f2937"/>
  <circle cx="305" cy="312" r="4" fill="#374151"/>
  <text x="460" y="305" text-anchor="middle" font-size="10" fill="#334155">Carotid dissection</text>
  <text x="460" y="319" text-anchor="middle" font-size="10" fill="#334155">Lateral medullary infarct</text>
  <text x="460" y="333" text-anchor="middle" font-size="10" fill="#334155">Ipsilateral hypothalamus</text>
  <text x="620" y="310" text-anchor="middle" font-size="11" fill="#0891b2" font-weight="600">CTA neck urgently</text>
  <text x="620" y="325" text-anchor="middle" font-size="10" fill="#334155">Rule out dissection</text>

  <!-- Bottom bar -->
  <rect x="20" y="346" width="660" height="24" rx="6" fill="#1e3a5f"/>
  <text x="350" y="362" text-anchor="middle" font-size="11" fill="white" font-weight="600">Use pupilometer when available — removes interrater variability. Document NPi (pupillary index) &lt;3 = abnormal.</text>
</svg>
